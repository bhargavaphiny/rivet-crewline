name: keepalive
# Pings the Render free instance so it doesn't spin down (avoids ~50s cold starts).
# Free because the repo is public (unlimited GitHub Actions minutes).
on:
  schedule:
    - cron: "*/10 * * * *"   # every 10 minutes (Render free sleeps after 15)
  workflow_dispatch: {}        # allow manual runs from the Actions tab
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping site
        run: curl -sSfL --max-time 60 https://rivet-crewline.onrender.com/ -o /dev/null
