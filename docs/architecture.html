    <rect x="20" y="826" width="1460" height="216" class="zone" rx="14"/>
    <text x="36" y="848" class="zl">THE SEVEN CORE DATA FLOWS</text>
    <text x="36" y="874" class="s">① SIGNUP — form → rate-limit check → user row (email_verified=0) → 6-digit code → Brevo → inbox → 6-box OTP screen → verified → onboarding. No unverified account passes the /app · /console guards.</text>
    <text x="36" y="896" class="s">② GOOGLE LOGIN — button → Google consent → signed-state callback → account created pre-verified (Google proved the email) → session cookie (HMAC-signed, HttpOnly).</text>
    <text x="36" y="918" class="s">③ PHONE LOGIN — "Email or mobile" field detects a number → Twilio SMS code → verify → session. Same 6-box UI as email.</text>
    <text x="36" y="940" class="s">④ MATCH & APPLY — worker Work Card + credentials vs 23k live jobs → scored & ranked → one-tap apply → employer pipeline (kanban) → stage moves notify worker (in-app + push + email + SMS).</text>
    <text x="36" y="962" class="s">⑤ CREDENTIAL VERIFICATION (the moat) — worker uploads proof photo → status: pending → admin reviews in /admin → approve = Verified badge → readiness recomputed → match scores actually move.</text>
    <text x="36" y="984" class="s">⑥ NOTIFICATION FAN-OUT — one sendMessage() call → in-app thread + web push (even with the site closed) + throttled email + optional SMS. Job posts alert matching available workers on all channels.</text>
    <text x="36" y="1006" class="s">⑦ INGESTION & DEPLOY — every 6h: fetch ~40 ATS feeds + 3 job APIs → dedupe/prune/retag → cache prewarm. Git push → Render builds → /healthz shows the new build hash.</text>
    <text x="36" y="1030" class="fl">Colors: blue = request path · green = data/notification pipelines · amber = admin/trust actions · gray = internal calls</text>
