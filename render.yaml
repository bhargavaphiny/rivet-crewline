services:
  - type: web
    name: rivet-crewline
    runtime: node
    plan: free
    region: oregon
    buildCommand: ""
    startCommand: node --experimental-sqlite server.js
    envVars:
      - key: NODE_VERSION
        value: "22.22.3"
      - key: RIVET_SECRET
        generateValue: true
      # Free plan has no mounted disk and /var isn't writable, so the DB
      # lives inside the project dir (ephemeral — reseeds on restart).
      - key: RIVET_DATA_DIR
        value: /opt/render/project/src/data
    # ---- Persistent data (PAID plan only) ----
    # To keep data permanently: upgrade `plan` above to `starter`, uncomment
    # the disk block below, and change RIVET_DATA_DIR above to /var/data.
    # disk:
    #   name: rivet-data
    #   mountPath: /var/data
    #   sizeGB: 1
